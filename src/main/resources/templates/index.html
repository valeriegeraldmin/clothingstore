<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Clothing Store</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #f9f9f9;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
        }

        .nav {
            margin-bottom: 20px;
        }

        .nav a {
            text-decoration: none;
            margin-right: 10px;
        }

        button {
            padding: 8px 12px;
            cursor: pointer;
            border: none;
            background-color: #333;
            color: white;
            border-radius: 4px;
        }

        button:hover {
            background-color: #555;
        }

        form {
            margin-bottom: 15px;
        }

        input, select {
            padding: 8px;
            margin-right: 10px;
        }

        table {
            border-collapse: collapse;
            width: 80%;
            margin-top: 20px;
            background-color: white;
        }

        th, td {
            padding: 12px;
            border: 1px solid #ccc;
            text-align: center;
        }

        th {
            background-color: #f2f2f2;
        }

        .actions a {
            margin: 0 5px;
            text-decoration: none;
            color: #0066cc;
        }

        .actions a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<h1>Welcome to Clothing Store</h1>

<div class="nav">
    <a href="/"><button type="button">Products</button></a>
    <a href="/cart"><button type="button">Cart</button></a>
    <a href="/orders"><button type="button">Orders</button></a>
    <a href="/add-product"><button type="button">Add Product</button></a>
</div>

<form action="/search" method="get">
    <input type="text" name="keyword" th:value="${keyword}" placeholder="Search by title">
    <button type="submit">Search</button>
</form>

<form action="/" method="get">
    <label for="sortType">Sort By:</label>
    <select name="sortType" id="sortType">
        <option value="">-- Select --</option>
        <option value="priceAsc" th:selected="${param.sortType != null and param.sortType[0] == 'priceAsc'}">Price: Low to High</option>
        <option value="priceDesc" th:selected="${param.sortType != null and param.sortType[0] == 'priceDesc'}">Price: High to Low</option>
        <option value="name" th:selected="${param.sortType != null and param.sortType[0] == 'name'}">Name: A-Z</option>
    </select>
    <button type="submit">Sort</button>
</form>

<table>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Price (€)</th>
        <th>Action</th>
    </tr>

    <tr th:each="product : ${products}">
        <td th:text="${product.id}"></td>
        <td th:text="${product.title}"></td>
        <td th:text="${product.price}"></td>
        <td class="actions">
            <a th:href="@{/edit-product/{id}(id=${product.id})}">Edit</a> |
            <a th:href="@{/delete-product/{id}(id=${product.id})}">Delete</a> |
            <a th:href="@{/cart/add/{id}(id=${product.id})}">Add</a>
        </td>
    </tr>
</table>

</body>
</html>
